name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # engines pins 22.23.1 and .npmrc sets engine-strict; keep CI in lockstep.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on high/critical advisories (caught the vitest CVE); lower
      # severities stay visible without blocking on transient dev-dep noise.
      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E (Playwright) (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      # One job per engine so the three run concurrently instead of serially.
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}

      - name: Install Playwright OS deps only (browser cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.project }}

      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

  # Branch protection requires a status check named "E2E (Playwright)", but
  # the job above matrixes into per-engine contexts ("E2E (Playwright)
  # (chromium)" etc.) that never post under the plain name. This job posts
  # under the exact required name once, aggregating the matrix's outcome.
  e2e-required:
    name: E2E (Playwright)
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every E2E matrix job to have succeeded
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "E2E matrix result: ${{ needs.e2e.result }}"
            exit 1
          fi
