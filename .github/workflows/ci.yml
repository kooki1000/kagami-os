name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      # engines pins 22.23.1 and .npmrc sets engine-strict; keep CI in lockstep.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on high/critical advisories (caught the vitest CVE); lower
      # severities stay visible without blocking on transient dev-dep noise.
      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    strategy:
      # One job per engine instead of one job looping through all three —
      # playwright.config.ts pins `workers: 1` in CI (avoids cross-window/
      # IndexedDB flakiness from parallel test contexts sharing a runner),
      # so without this split all three engines ran fully serially in a
      # single job. Splitting keeps that same in-engine serialization but
      # runs the three engines concurrently across runners instead.
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Browser binaries only (~150-200MB per engine) — the runner VM
      # itself is fresh every run, so this can't cache the OS-level apt
      # packages `--with-deps` also installs; those still run below on
      # every job regardless of cache hit.
      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser + OS deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps ${{ matrix.project }}

      - name: Install Playwright OS deps only (browser cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps ${{ matrix.project }}

      - name: Run E2E tests
        run: pnpm exec playwright test --project=${{ matrix.project }}

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
